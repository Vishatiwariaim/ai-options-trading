name: Live Market Data

# Refreshes docs/data.json with live market signals. GitHub Pages (served from
# /docs) then shows the updated dashboard — no live backend server needed.

on:
  schedule:
    # Every 15 min during NSE hours: 9:15–15:30 IST = ~03:45–10:00 UTC, Mon–Fri.
    - cron: "*/15 3-10 * * 1-5"
  workflow_dispatch: {}        # allow manual "Run workflow"
  push:
    branches: [ main ]
    paths:
      - "backend/**"
      - "docs/index.html"
      - ".github/workflows/live-data.yml"

permissions:
  contents: write

concurrency:
  group: live-data
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements-data.txt

      - name: Generate data.json
        working-directory: backend
        env:
          # Optional: add a repo secret UPSTOX_ACCESS_TOKEN for REAL option chain.
          # (Upstox tokens expire 3:30 AM IST daily, so update it before market.)
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
        run: python -m scripts.generate_data

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh live market data [skip ci]"
            git push
          fi
